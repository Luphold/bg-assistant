<!DOCTYPE html>
<!-- Yatzy Scorecard 1.5.0 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Yatzy Scorecard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f6f3ec">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #f6f3ec;          /* warm cream */
      --panel: #ffffff;
      --text: #2c2a25;        /* near-black charcoal */
      --text-dim: #6b685e;
      --border: #d8d1c1;
      --border-strong: #9b9484;
      --accent: #4a7a52;      /* muted green */
      --accent-soft: #e6efe7;
      --gold: #b89734;
      --red: #c0473f;
      --header-bg: #2c2a25;
      --header-text: #f6f3ec;
      --row-alt: #faf7f0;
      --filled-bg: #eef4ef;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.4;
      font-size: 14px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 12px; }
    
    /* Header */
    .hdr { position: relative; padding: 18px 8px 14px; text-align: center; border-bottom: 1px solid var(--border); }
    .hdr h1 { margin: 0; font-size: 22px; letter-spacing: .15em; color: var(--text); font-weight: 700; }
    .hdr .sub { margin-top: 4px; font-size: 11px; color: var(--text-dim); letter-spacing: .1em; text-transform: uppercase; }
    .hdr .back-btn {
      position: absolute; left: 6px; top: 16px;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px;
      padding: 5px 10px; border-radius: 6px; text-decoration: none;
      line-height: 1;
    }
    .hdr .back-btn:hover { background: var(--panel); color: var(--text); }
    .hdr .supa-status-mini {
      position: absolute; right: 6px; top: 12px;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; font-size: 11px;
      border-radius: 6px; background: var(--panel); border: 1px solid var(--border);
      max-width: 160px;
    }
    .hdr .supa-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-dim); }
    .hdr .supa-dot.ok { background: #4caf50; }
    .hdr .supa-dot.error { background: var(--red); }
    .hdr #supa-text { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hdr #supa-text.ok { color: #4caf50; }
    .hdr #supa-text.error { color: var(--red); }
    
    /* Generic */
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin: 12px 0; }
    .section-title { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); margin: 16px 0 6px; padding: 0 4px; }
    .small { font-size: 12px; }
    .dim { color: var(--text-dim); }
    .center { text-align: center; }
    
    /* Buttons */
    .btn {
      background: var(--panel); border: 1px solid var(--border-strong);
      color: var(--text); padding: 10px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background .12s ease, border-color .12s ease;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: var(--row-alt); border-color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover:not(:disabled) { background: #3d6443; border-color: #3d6443; }
    .btn.danger { background: var(--panel); border-color: var(--red); color: var(--red); }
    .btn.danger:hover:not(:disabled) { background: var(--red); color: white; }
    .btn.full { display: block; width: 100%; }
    .btn.sm { padding: 6px 10px; font-size: 12px; }
    
    /* Inputs */
    input[type="text"], input[type="number"] {
      background: var(--panel); border: 1px solid var(--border-strong);
      color: var(--text); padding: 8px 10px; border-radius: 6px;
      font-size: 14px; width: 100%; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); }
    
    /* Setup screen */
    .setup-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .setup-row input { flex: 1; }
    .setup-row .remove { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px 8px; }
    
    /* Scorecard table */
    .scorecard {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    table.score-table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed;
    }
    .score-table th, .score-table td {
      padding: 3px 4px; text-align: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 21px;
      font-weight: 600;
      line-height: 1.1;
    }
    .score-table th { background: var(--header-bg); color: var(--header-text); font-weight: 600; letter-spacing: .04em; font-size: 14px; padding: 8px 4px; }
    .score-table th.cat-header { text-align: left; width: 30%; padding-left: 14px; font-size: 12px; }
    .score-table td.cat-name { text-align: left; padding-left: 14px; font-weight: 500; color: var(--text); font-size: 14px; }
    .score-table td.cat-hint { text-align: left; padding-left: 14px; }
    .score-table td.cat-hint .hint-line { font-size: 10px; color: var(--text-dim); margin-top: 1px; font-style: italic; }
    .score-table tr:nth-child(even) td { background: var(--row-alt); }
    .score-table tr.row-summary td { background: var(--accent-soft); font-weight: 600; }
    .score-table tr.row-bonus td { background: var(--accent-soft); font-weight: 600; font-style: italic; font-size: 18px; }
    .score-table tr.row-total td { background: var(--header-bg); color: var(--header-text); font-weight: 700; font-size: 22px; }
    
    /* Score cells */
    .score-cell {
      cursor: pointer;
      color: var(--text-dim);
      transition: background .12s ease;
    }
    .score-cell:hover:not(.locked) { background: #efeadf !important; }
    .score-cell.filled {
      background: var(--filled-bg) !important;
      color: var(--text);
      font-weight: 600;
    }
    .score-cell.zero {
      color: var(--red);
      font-weight: 500;
    }
    .score-cell.locked { cursor: default; }
    .score-cell.auto { background: transparent !important; font-style: italic; color: var(--text-dim); }
    
    /* Player header colors */
    .player-col-1 { border-top: 3px solid #c0473f; }
    .player-col-2 { border-top: 3px solid #1f6fad; }
    .player-col-3 { border-top: 3px solid #7a4ba8; }
    .player-col-4 { border-top: 3px solid #b89734; }
    .player-col-5 { border-top: 3px solid #2e8c66; }
    
    /* Active player column highlighting */
    th.active-col {
      background: #4a7a52 !important;
      box-shadow: inset 0 -2px 0 #ffd861;
    }
    td.active-col { background: #f5fbf6 !important; }
    .score-table tr:nth-child(even) td.active-col { background: #eef6ee !important; }
    .score-table tr.row-summary td.active-col { background: #d8ebd9 !important; }
    .score-table tr.row-bonus td.active-col { background: #d8ebd9 !important; }
    .score-table tr.row-total td.active-col { background: #3d6443 !important; }
    
    /* Active cell with score still wins over active-col */
    .score-cell.filled.active-col { background: #d6ebd7 !important; }
    
    /* Disabled cells: empty cells of non-active players — non-tappable, dim */
    .score-cell.disabled {
      cursor: default;
      color: #bdb8a8;
      background: transparent !important;
    }
    .score-cell.disabled:hover { background: transparent !important; }
    
    /* Turn marker triangle in header */
    .turn-marker {
      color: #ffd861;
      font-size: 10px;
      vertical-align: middle;
      margin-right: 2px;
    }
    
    /* Action bar */
    .action-bar {
      display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap;
    }
    .action-bar .btn { flex: 1; min-width: 120px; }
    
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(44, 42, 37, 0.55);
      backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; max-width: 440px; width: 94%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { margin: 0 0 8px; font-size: 16px; }
    .modal .cat-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; font-style: italic; }
    .modal .score-input { font-size: 28px; text-align: center; padding: 12px; }
    .modal .quick-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; justify-content: center; }
    .modal .quick-btn {
      background: var(--row-alt); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 6px;
      cursor: pointer; min-width: 38px; font-weight: 500;
    }
    .modal .quick-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
    .modal .quick-btn.zero { background: var(--panel); border-color: var(--red); color: var(--red); }
    .modal .modal-buttons { display: flex; gap: 8px; margin-top: 12px; }
    .modal .modal-buttons .btn { flex: 1; }
    
    /* Modal picker rows */
    .picker-instructions { font-size: 11px; color: var(--text-dim); text-align: center; margin-bottom: 8px; font-style: italic; }
    .picker-rows { display: flex; flex-direction: column; gap: 5px; margin: 8px 0 12px; }
    .picker-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--panel); cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .picker-row:not(.picker-row-static):hover {
      background: var(--accent-soft); border-color: var(--accent);
    }
    .picker-row.picker-skip { border-style: dashed; }
    .picker-row.picker-skip:hover { background: #fbeceb; border-color: var(--red); }
    .picker-row-static { cursor: default; justify-content: center; }
    .picker-row-static:hover { background: var(--panel); border-color: var(--border); }
    .picker-dice {
      flex: 1; display: flex; gap: 4px; align-items: center; justify-content: flex-start;
      flex-wrap: wrap; min-height: 30px;
    }
    .picker-skip-label { color: var(--text-dim); font-style: italic; font-size: 13px; justify-content: center; }
    .picker-score {
      min-width: 36px; text-align: right; font-weight: 700; font-size: 16px; color: var(--text);
    }
    
    /* Two-column picker for 2 Pairs / Full House */
    .picker-2col {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;
    }
    .picker-col { display: flex; flex-direction: column; gap: 4px; }
    .picker-col-label {
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim); text-align: center; margin-bottom: 4px;
    }
    .picker-row.picker-sub {
      padding: 5px 8px; gap: 4px;
    }
    .picker-row.picker-sub .picker-dice { gap: 3px; }
    .picker-row.selected {
      background: var(--accent); border-color: var(--accent);
    }
    .picker-row.selected .picker-dice svg rect { fill: rgba(255,255,255,0.95); }
    .picker-row.disabled {
      opacity: 0.35; cursor: not-allowed; background: var(--row-alt);
    }
    .picker-row.disabled:hover { background: var(--row-alt); border-color: var(--border); }
    
    .picker-total-row {
      text-align: center; padding: 8px 0; border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .picker-total {
      display: inline-block; font-size: 24px; font-weight: 700; color: var(--text);
      min-width: 50px; padding: 4px 12px;
    }
    .picker-action-row { display: flex; gap: 8px; margin-top: 10px; }
    .picker-action-row .btn { flex: 1; }
    
    /* Chance picker */
    .picker-chance-row {
      display: flex; gap: 8px; justify-content: center; margin: 12px 0;
    }
    .picker-die-tappable {
      cursor: pointer; padding: 4px; border-radius: 6px;
      transition: background .12s;
    }
    .picker-die-tappable:hover { background: var(--accent-soft); }
    .picker-die-tappable:active { transform: scale(0.95); }
    
    /* Yatzy big label */
    .yatzy-label {
      font-size: 36px; font-weight: 900; letter-spacing: .15em;
      color: var(--red); text-align: center; padding: 14px 0;
    }
    
    /* Scale picker dice down a bit on small screens */
    @media (max-width: 600px) {
      .picker-dice svg { width: 22px !important; height: 22px !important; }
      .picker-row { padding: 7px 10px; }
      .picker-score { font-size: 14px; }
      .picker-die-tappable svg { width: 38px !important; height: 38px !important; }
      .picker-2col .picker-dice svg { width: 18px !important; height: 18px !important; }
    }
    
    /* History/stats */
    .stats-row {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
      gap: 8px; padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stats-row.header { font-weight: 700; background: var(--row-alt); border-radius: 6px 6px 0 0; }
    .stats-row .name { font-weight: 600; }
    
    .footer { text-align: center; padding: 20px 0; color: var(--text-dim); font-size: 11px; }
    
    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }
    
    @media (max-width: 600px) {
      .score-table th, .score-table td { padding: 3px 2px; font-size: 18px; }
      .score-table th { padding: 6px 2px; }
      .score-table th.cat-header, .score-table td.cat-name { width: 30%; padding-left: 8px; font-size: 11px; }
      .score-table tr.row-total td { font-size: 19px; }
      .score-table tr.row-bonus td { font-size: 16px; }
      .hdr h1 { font-size: 18px; }
      .stats-row { grid-template-columns: 1.5fr 0.7fr 0.7fr 1fr 1fr; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hdr">
      <a href="../" class="back-btn" title="Back to Board Game Assistant front page">⮌</a>
      <h1>YATZY</h1>
      <div class="sub">Swedish Scorecard</div>
      <div class="supa-status-mini" id="supa-status">
        <span class="supa-dot" id="supa-dot"></span>
        <span id="supa-text">Checking…</span>
      </div>
    </div>
    
    <!-- Setup screen -->
    <div id="screen-setup" class="screen active">
      <div id="resume-banner" style="display:none">
        <div class="panel" style="border-color:var(--accent);background:var(--accent-soft)">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:24px">↺</div>
            <div style="flex:1">
              <div style="font-weight:600">Game in progress</div>
              <div class="dim small" id="resume-detail">Tap Resume to continue</div>
            </div>
          </div>
          <div class="action-bar" style="margin-top:10px">
            <button class="btn primary" id="btn-resume">Resume Game</button>
            <button class="btn danger" id="btn-discard-resume">Discard</button>
          </div>
        </div>
      </div>
      <div class="section-title">Players (2-5)</div>
      <div class="panel">
        <div id="player-inputs"></div>
        <button class="btn full sm" id="btn-add-player" style="margin-top:8px">+ Add Player</button>
      </div>
      <div class="action-bar">
        <button class="btn primary" id="btn-start">Start Game</button>
        <button class="btn" id="btn-view-stats">View Stats</button>
      </div>
    </div>
    
    <!-- Game screen -->
    <div id="screen-game" class="screen">
      <div class="scorecard">
        <table class="score-table" id="score-table"></table>
      </div>
      <div class="action-bar">
        <button class="btn primary" id="btn-end-game">End Game & Save</button>
        <button class="btn danger" id="btn-cancel-game">Cancel Game</button>
      </div>
    </div>
    
    <!-- Stats screen -->
    <div id="screen-stats" class="screen">
      <div class="section-title">Player Stats</div>
      <div class="panel" id="stats-panel">
        <div class="dim center" style="padding:20px">Loading stats…</div>
      </div>
      <div class="action-bar">
        <button class="btn" id="btn-stats-back">⮌ Back</button>
      </div>
    </div>
    
    <div class="footer">
      Yatzy Scorecard
      <div class="version">v1.5.0</div>
    </div>
  </div>
  
  <!-- Modal for entering scores -->
  <div class="modal-overlay" id="score-modal-overlay">
    <div class="modal" id="score-modal"></div>
  </div>
  
  <script>
    // =============================================================================
    // SWEDISH YATZY — Category definitions
    // =============================================================================
    var VERSION = '1.5.0';
    
    var CATEGORIES = [
      { key: 'ones',    name: 'Ones',          dice: 1, group: 'upper', max: 5 },
      { key: 'twos',    name: 'Twos',          dice: 2, group: 'upper', max: 10 },
      { key: 'threes',  name: 'Threes',        dice: 3, group: 'upper', max: 15 },
      { key: 'fours',   name: 'Fours',         dice: 4, group: 'upper', max: 20 },
      { key: 'fives',   name: 'Fives',         dice: 5, group: 'upper', max: 25 },
      { key: 'sixes',   name: 'Sixes',         dice: 6, group: 'upper', max: 30 },
      { key: 'pair',    name: 'Pair',                   group: 'lower', max: 12 },
      { key: 'twoPair', name: '2 Pairs',                group: 'lower', max: 22 },
      { key: 'three',   name: '3 of Kind',              group: 'lower', max: 18 },
      { key: 'four',    name: '4 of Kind',              group: 'lower', max: 24 },
      { key: 'smallSt', name: 'Sm. Straight',           group: 'lower', max: 15, fixed: 15 },
      { key: 'largeSt', name: 'Lg. Straight',           group: 'lower', max: 20, fixed: 20 },
      { key: 'house',   name: 'Full House',             group: 'lower', max: 28 },
      { key: 'chance',  name: 'Chance',                 group: 'lower', max: 30 },
      { key: 'yatzy',   name: 'Yatzy',                  group: 'lower', max: 50, fixed: 50 }
    ];
    
    var PLAYER_COLORS = ['#c0473f', '#1f6fad', '#7a4ba8', '#b89734', '#2e8c66'];
    
    // =============================================================================
    // STATE
    // =============================================================================
    var state = {
      players: [],          // [{ name, scores: { categoryKey: number|null } }]
      currentPlayerIdx: 0,  // whose turn it is right now
      started: false,
      ended: false,
      startTime: null,
      endTime: null
    };
    
    var supabase = null;
    var STORAGE_KEY_DB = 'bg-assistant';
    
    // -------------------------------------------------------------
    // Local persistence (localStorage) — survives page refresh
    //   yatzy-players : last used player name list (default for new games)
    //   yatzy-state   : in-progress game snapshot (cleared on End / Cancel)
    // -------------------------------------------------------------
    var LS_PLAYERS = 'bg-settings:yatzy-players';
    var LS_STATE   = 'bg-settings:yatzy-state';
    
    function saveLastPlayerNames() {
      try {
        var names = (state.players || []).map(function(p) { return p.name; });
        if (!names.length) names = window._setupNames || [];
        if (names.length >= 2) localStorage.setItem(LS_PLAYERS, JSON.stringify(names));
      } catch (e) {}
    }
    function loadLastPlayerNames() {
      try {
        var raw = localStorage.getItem(LS_PLAYERS);
        if (!raw) return null;
        var arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length >= 2) return arr;
      } catch (e) {}
      return null;
    }
    
    function saveGameState() {
      if (!state.started || state.ended) return;
      try {
        localStorage.setItem(LS_STATE, JSON.stringify(state));
      } catch (e) {}
    }
    function loadSavedGameState() {
      try {
        var raw = localStorage.getItem(LS_STATE);
        if (!raw) return null;
        var s = JSON.parse(raw);
        if (s && s.started && !s.ended && Array.isArray(s.players) && s.players.length >= 2) return s;
      } catch (e) {}
      return null;
    }
    function clearGameState() {
      try { localStorage.removeItem(LS_STATE); } catch (e) {}
    }
    
    // =============================================================================
    // IndexedDB + localStorage shadow (same pattern as TI4)
    // =============================================================================
    var _db = null;
    function openDB() {
      return new Promise(function(resolve, reject) {
        if (_db) { resolve(_db); return; }
        var req = indexedDB.open(STORAGE_KEY_DB, 1);
        req.onupgradeneeded = function(e) {
          var d = e.target.result;
          if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'k' });
          if (!d.objectStoreNames.contains('history'))  d.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
          if (!d.objectStoreNames.contains('logs'))     d.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = function(e) { _db = e.target.result; resolve(_db); };
        req.onerror = function() { reject(req.error); };
      });
    }
    function dbGet(store, key) {
      function readLs() {
        if (store !== 'settings') return null;
        try {
          var ls = localStorage.getItem('bg-settings:' + key);
          if (ls == null) return null;
          if (ls.indexOf('__json__') === 0) {
            try { return { k: key, v: JSON.parse(ls.substring(8)) }; } catch (e) { return null; }
          }
          return { k: key, v: ls };
        } catch (e) { return null; }
      }
      return openDB().then(function(d) {
        return new Promise(function(resolve) {
          try {
            var r = d.transaction(store).objectStore(store).get(key);
            r.onsuccess = function() { resolve(r.result || readLs()); };
            r.onerror = function() { resolve(readLs()); };
          } catch (e) { resolve(readLs()); }
        });
      }).catch(function() { return readLs(); });
    }
    
    // =============================================================================
    // SUPABASE
    // =============================================================================
    function loadSupabase(url, key) {
      return new Promise(function(resolve, reject) {
        if (window.supabase && window.supabase.createClient) {
          resolve(window.supabase.createClient(url, key));
          return;
        }
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
        s.onload = function() {
          try { resolve(window.supabase.createClient(url, key)); } catch (e) { reject(e); }
        };
        s.onerror = function() { reject(new Error('Could not load Supabase library')); };
        document.head.appendChild(s);
      });
    }
    
    function initSupabase() {
      return Promise.all([dbGet('settings', 'url'), dbGet('settings', 'key')]).then(function(results) {
        var url = results[0] && results[0].v;
        var key = results[1] && results[1].v;
        // Also check localStorage fallback for credentials saved by front page
        if (!url) { try { url = localStorage.getItem('bg-settings:url'); } catch (e) {} }
        if (!key) { try { key = localStorage.getItem('bg-settings:key'); } catch (e) {} }
        if (!url || !key) {
          setSupaStatus('error', 'Not configured', 'Set up Supabase on the Board Game Assistant front page');
          return null;
        }
        return loadSupabase(url, key).then(function(c) {
          supabase = c;
          pingSupabase();
          return c;
        }).catch(function(e) {
          setSupaStatus('error', 'Error', e.message);
          return null;
        });
      });
    }
    
    function setSupaStatus(stateName, msg, fullMsg) {
      var dot = document.getElementById('supa-dot');
      var txt = document.getElementById('supa-text');
      dot.classList.remove('ok', 'error');
      txt.classList.remove('ok', 'error');
      if (stateName === 'ok') { dot.classList.add('ok'); txt.classList.add('ok'); }
      else if (stateName === 'error') { dot.classList.add('error'); txt.classList.add('error'); }
      txt.textContent = msg;
      document.getElementById('supa-status').title = fullMsg || msg;
    }
    function pingSupabase() {
      if (!supabase) return;
      supabase.from('yatzy_history').select('id').limit(1).then(function(r) {
        if (r.error) {
          var m = r.error.message || '';
          if (m.toLowerCase().indexOf('yatzy_history') >= 0 || m.toLowerCase().indexOf('not exist') >= 0) {
            setSupaStatus('error', 'Table missing', 'yatzy_history table missing — run supabase-setup.sql');
          } else {
            setSupaStatus('error', 'Error', m);
          }
        } else {
          setSupaStatus('ok', 'Supabase OK', 'Supabase OK');
        }
      }).catch(function() { setSupaStatus('error', 'Error', 'Network error'); });
    }
    setInterval(function() { pingSupabase(); }, 30000);

    // GAME SCREEN — Scorecard

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
    }
    
    function calcUpperSum(p) {
      var sum = 0;
      ['ones','twos','threes','fours','fives','sixes'].forEach(function(k) {
        if (typeof p.scores[k] === 'number') sum += p.scores[k];
      });
      return sum;
    }
    // Running differential vs. the pace target needed for the +50 bonus.
    // Pace target: 3 of each die value = 3, 6, 9, 12, 15, 18 (totals 63).
    // We only sum the pace for categories actually scored so far,
    // then return (actualSum - paceTarget). Positive = ahead of pace; negative = behind.
    var UPPER_KEYS = ['ones','twos','threes','fours','fives','sixes'];
    var UPPER_PACE = { ones:3, twos:6, threes:9, fours:12, fives:15, sixes:18 };
    function calcBonusDiff(p) {
      var actual = 0, target = 0, anyScored = false;
      UPPER_KEYS.forEach(function(k) {
        if (typeof p.scores[k] === 'number') {
          actual += p.scores[k];
          target += UPPER_PACE[k];
          anyScored = true;
        }
      });
      return { diff: actual - target, anyScored: anyScored };
    }
    function calcBonus(p) {
      return calcUpperSum(p) >= 63 ? 50 : 0;
    }
    function calcTotal(p) {
      var sum = calcBonus(p);
      CATEGORIES.forEach(function(c) {
        if (typeof p.scores[c.key] === 'number') sum += p.scores[c.key];
      });
      return sum;
    }
    
    // Render a small die face SVG with 1-6 dots
    function diceSvg(n) {
      // Dot positions in a 3x3 grid (centers in % terms)
      var positions = {
        1: [[50, 50]],
        2: [[28, 28], [72, 72]],
        3: [[28, 28], [50, 50], [72, 72]],
        4: [[28, 28], [72, 28], [28, 72], [72, 72]],
        5: [[28, 28], [72, 28], [50, 50], [28, 72], [72, 72]],
        6: [[28, 25], [72, 25], [28, 50], [72, 50], [28, 75], [72, 75]]
      };
      var dots = positions[n] || [];
      var size = 28;
      var html = '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '" style="vertical-align:middle">';
      html += '<rect x="6" y="6" width="88" height="88" rx="14" ry="14" fill="#fff" stroke="#2c2a25" stroke-width="4"/>';
      dots.forEach(function(d) {
        html += '<circle cx="' + d[0] + '" cy="' + d[1] + '" r="8" fill="#2c2a25"/>';
      });
      html += '</svg>';
      return html;
    }
    
    function renderScorecard() {
      var tbl = document.getElementById('score-table');
      var current = state.currentPlayerIdx;
      var h = '';
      // Header
      h += '<thead><tr><th class="cat-header">Category</th>';
      state.players.forEach(function(p, i) {
        var activeMark = (i === current && !state.ended) ? ' active-col' : '';
        h += '<th class="player-col-' + (i+1) + activeMark + '">';
        h += escapeHtml(p.name);
        h += '</th>';
      });
      h += '</tr></thead><tbody>';
      
      // Upper section
      CATEGORIES.filter(function(c) { return c.group === 'upper'; }).forEach(function(cat) {
        h += renderRow(cat, current);
      });
      // Upper Sum row (auto) — with running differential vs +50 bonus pace
      h += '<tr class="row-summary"><td class="cat-name">Sum</td>';
      state.players.forEach(function(p, i) {
        var sum = calcUpperSum(p);
        var d = calcBonusDiff(p);
        var diffLabel = '';
        if (d.anyScored) {
          var sign = d.diff > 0 ? '+' : '';
          var color = d.diff > 0 ? 'var(--accent)' : d.diff < 0 ? 'var(--red)' : 'var(--text-dim)';
          diffLabel = ' <span style="color:' + color + ';font-weight:600">(' + sign + d.diff + ')</span>';
        }
        h += '<td class="auto' + (i === current && !state.ended ? ' active-col' : '') + '">' + sum + diffLabel + '</td>';
      });
      h += '</tr>';
      // Bonus row (auto)
      h += '<tr class="row-bonus"><td class="cat-name">Bonus</td>';
      state.players.forEach(function(p, i) {
        var bonus = calcBonus(p);
        h += '<td class="auto' + (i === current && !state.ended ? ' active-col' : '') + '" style="color:' + (bonus ? 'var(--accent)' : 'var(--text-dim)') + ';font-weight:' + (bonus ? '700' : '400') + '">' + (bonus ? '+50' : '–') + '</td>';
      });
      h += '</tr>';
      
      // Lower section
      CATEGORIES.filter(function(c) { return c.group === 'lower'; }).forEach(function(cat) {
        h += renderRow(cat, current);
      });
      
      // Total row (auto)
      h += '<tr class="row-total"><td class="cat-name" style="color:var(--header-text)">TOTAL</td>';
      state.players.forEach(function(p, i) {
        h += '<td' + (i === current && !state.ended ? ' class="active-col"' : '') + '>' + calcTotal(p) + '</td>';
      });
      h += '</tr>';
      
      h += '</tbody>';
      tbl.innerHTML = h;
    }
    
    function renderRow(cat, currentPlayer) {
      var label;
      if (cat.dice) {
        label = diceSvg(cat.dice);
      } else {
        label = escapeHtml(cat.name);
      }
      var h = '<tr><td class="cat-name">' + label + '</td>';
      state.players.forEach(function(p, i) {
        var val = p.scores[cat.key];
        var isFilled = (val !== null && val !== undefined);
        var isActive = (i === currentPlayer) && !state.ended;
        var cls = 'score-cell';
        var content = '';
        if (!isFilled) {
          content = '–';
          if (!isActive) cls += ' disabled';
        } else if (val === 0) {
          cls += ' filled zero';
          content = '0';
        } else {
          cls += ' filled';
          content = val;
        }
        if (isActive) cls += ' active-col';
        h += '<td class="' + cls + '" data-player="' + i + '" data-cat="' + cat.key + '">' + content + '</td>';
      });
      h += '</tr>';
      return h;
    }
    
    // Tap to enter score (active player's empty cells, OR any filled cell for correction)
    document.getElementById('score-table').addEventListener('click', function(e) {
      var cell = e.target.closest('.score-cell');

      if (cell.classList.contains('disabled')) return; // inactive player's empty cell — not tappable

    function openScoreModal(playerIdx, catKey) {

    // -------------------------------------------------------------
    // Picker body builders — category-specific UI
    // -------------------------------------------------------------
    function buildPickerBody(cat) {
      if (cat.group === 'upper') return buildUpperPicker(cat);
      if (cat.key === 'pair') return buildSinglePairPicker();
      if (cat.key === 'three') return buildOfAKindPicker(3);
      if (cat.key === 'four') return buildOfAKindPicker(4);
      if (cat.key === 'twoPair') return buildTwoPairsPicker();
      if (cat.key === 'house') return buildFullHousePicker();
      if (cat.key === 'smallSt') return buildFixedPicker(15, 'Sm. Straight', [1,2,3,4,5]);
      if (cat.key === 'largeSt') return buildFixedPicker(20, 'Lg. Straight', [2,3,4,5,6]);
      if (cat.key === 'yatzy') return buildYatzyPicker();
      if (cat.key === 'chance') return buildChancePicker();
      return '<div class="dim">Unsupported category</div>';
    }
    
    function diceGroup(n, count) {
      var html = '';
      for (var i = 0; i < count; i++) html += diceSvg(n);
      return html;
    }

      var n = cat.dice;

        h += '<div class="picker-dice">' + diceGroup(n, count) + '</div>';
        h += '<div class="picker-score">' + score + '</div>';
        h += '</div>';

      // 0 / skip option
      h += '<div class="picker-row picker-skip" data-score="0">';
      h += '<div class="picker-dice picker-skip-label">— skip / 0 —</div>';
      h += '<div class="picker-score">0</div>';
      h += '</div>';
      h += '</div>';
      return h;
    }

    // -------------------------------------------------------------
    // Picker wiring
    // -------------------------------------------------------------
    function wirePicker(cat) {
      var body = document.getElementById('picker-body');
      
      // Single-tap rows that immediately save a score (upper, single pair, of-a-kind)
      var directKeys = ['ones','twos','threes','fours','fives','sixes','pair','three','four'];
      if (directKeys.indexOf(cat.key) >= 0) {
        body.querySelectorAll('.picker-row[data-score]').forEach(function(row) {
          row.addEventListener('click', function() {
            var s = parseInt(this.getAttribute('data-score'), 10);
            saveScore(s);
          });
        });
        return;
      }
      
      // Two pairs / Full house — pick one from each column then Confirm
      if (cat.key === 'twoPair' || cat.key === 'house') {
        var selected = { 0: null, 1: null }; // n values picked per column
        var rows = body.querySelectorAll('.picker-row.picker-sub');
        function refresh() {
          rows.forEach(function(r) {
            var col = parseInt(r.getAttribute('data-col'), 10);
            var n = parseInt(r.getAttribute('data-n'), 10);
            r.classList.remove('selected', 'disabled');
            if (selected[col] === n) r.classList.add('selected');
            // Disable the same number in the opposite column
            var otherCol = 1 - col;
            if (selected[otherCol] === n) r.classList.add('disabled');
          });
          // Update total and confirm
          var totalEl = document.getElementById('picker-total');
          var confirmBtn = document.getElementById(cat.key === 'twoPair' ? 'btn-2p-confirm' : 'btn-fh-confirm');
          if (selected[0] != null && selected[1] != null) {
            var total;
            if (cat.key === 'twoPair') {
              // Two pairs scored as the sum of all 4 dice
              total = selected[0] * 2 + selected[1] * 2;
            } else {
              // Full house = 3 of a kind sum + pair sum
              total = selected[0] * 3 + selected[1] * 2;
            }
            totalEl.textContent = total;
            confirmBtn.disabled = false;
            confirmBtn.setAttribute('data-score', total);
          } else {
            totalEl.textContent = '–';
            confirmBtn.disabled = true;
          }
        }
        rows.forEach(function(r) {
          r.addEventListener('click', function() {
            if (this.classList.contains('disabled')) return;
            var col = parseInt(this.getAttribute('data-col'), 10);
            var n = parseInt(this.getAttribute('data-n'), 10);
            // Toggle: tap again to deselect
            if (selected[col] === n) selected[col] = null;
            else selected[col] = n;
            refresh();
          });
        });
        var confirmBtn = document.getElementById(cat.key === 'twoPair' ? 'btn-2p-confirm' : 'btn-fh-confirm');
        confirmBtn.addEventListener('click', function() {
          var s = parseInt(this.getAttribute('data-score'), 10);
          if (!isNaN(s)) saveScore(s);
        });
        var skipBtn = document.getElementById(cat.key === 'twoPair' ? 'btn-2p-skip' : 'btn-fh-skip');
        skipBtn.addEventListener('click', function() { saveScore(0); });
        return;
      }
      
      // Straights + Yatzy — Score/Skip buttons each with data-score
      if (cat.key === 'smallSt' || cat.key === 'largeSt' || cat.key === 'yatzy') {
        body.querySelectorAll('button[data-score]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var s = parseInt(this.getAttribute('data-score'), 10);
            saveScore(s);
          });
        });
        return;
      }
      
      // Chance — tappable dice + Confirm + Skip
      if (cat.key === 'chance') {
        var diceVals = [1, 1, 1, 1, 1];
        var diceEls = body.querySelectorAll('.picker-die-tappable');
        function updateTotal() {
          var sum = diceVals.reduce(function(a,b){return a+b;}, 0);
          document.getElementById('picker-total').textContent = sum;
        }
        diceEls.forEach(function(d, idx) {
          d.addEventListener('click', function() {
            diceVals[idx] = (diceVals[idx] % 6) + 1;
            this.setAttribute('data-val', diceVals[idx]);
            this.innerHTML = diceSvg(diceVals[idx]);
            updateTotal();
          });
        });
        document.getElementById('btn-chance-confirm').addEventListener('click', function() {
          var sum = diceVals.reduce(function(a,b){return a+b;}, 0);
          saveScore(sum);
        });
        document.getElementById('btn-chance-skip').addEventListener('click', function() { saveScore(0); });
        return;
      }
    }
    
    function saveScore(v) {
      if (!_currentEditCell) return;
      var savedPlayerIdx = _currentEditCell.playerIdx;
      var savedCatKey = _currentEditCell.catKey;
      var p = state.players[savedPlayerIdx];
      var wasEmpty = (p.scores[savedCatKey] === null || p.scores[savedCatKey] === undefined);
      p.scores[savedCatKey] = v;
      closeScoreModal();
      
      // Auto-advance turn only when:
      //   1. The active player was the one editing
      //   2. This was an empty cell being filled (not a correction)
      //   3. There's at least one MORE empty cell remaining in the game
      //      (so the last input stays editable in case it was wrong)
      var wasActive = (savedPlayerIdx === state.currentPlayerIdx);
      if (wasActive && wasEmpty) {
        var emptyCount = 0;
        state.players.forEach(function(pl) {
          CATEGORIES.forEach(function(c) {
            if (pl.scores[c.key] === null || pl.scores[c.key] === undefined) emptyCount++;
          });
        });
        if (emptyCount >= 1) {
          advanceTurn();
        }
      }
      
      renderScorecard();
      saveGameState();
    }
    
    function advanceTurn() {
      var n = state.players.length;
      for (var step = 1; step <= n; step++) {
        var idx = (state.currentPlayerIdx + step) % n;
        var p = state.players[idx];
        // Skip players who have no empty cells left
        var anyEmpty = CATEGORIES.some(function(c) {
          return p.scores[c.key] === null || p.scores[c.key] === undefined;
        });
        if (anyEmpty) {
          state.currentPlayerIdx = idx;
          return;
        }
      }
      // Everyone is done — leave currentPlayerIdx where it is
    }
    
    function closeScoreModal() {
      document.getElementById('score-modal-overlay').classList.remove('open');
      _currentEditCell = null;
    }
    document.getElementById('score-modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeScoreModal();
    });
    
    // =============================================================================
    // END GAME
    // =============================================================================
    document.getElementById('btn-end-game').addEventListener('click', function() {
      // Check that every cell is filled — if not, refuse to end
      var unfilled = 0;
      state.players.forEach(function(p) {
        CATEGORIES.forEach(function(c) {
          if (p.scores[c.key] === null || p.scores[c.key] === undefined) unfilled++;
        });
      });
      if (unfilled > 0) {
        alert(unfilled + ' score cell' + (unfilled === 1 ? '' : 's') + ' still empty.\n\nFill all cells before ending the game, or tap Cancel Game to abandon it.');
        return;
      }
      
      state.ended = true;
      state.endTime = new Date().toISOString();
      
      // Determine winner(s) — highest total; ties = all share a draw
      var totals = state.players.map(function(p, i) { return { idx: i, name: p.name, total: calcTotal(p) }; });
      var maxTotal = Math.max.apply(null, totals.map(function(t) { return t.total; }));
      var topPlayers = totals.filter(function(t) { return t.total === maxTotal; });
      var isDraw = topPlayers.length > 1;
      
      var historyEntry = {
        playedAt: new Date().toISOString(),
        startTime: state.startTime,
        endTime: state.endTime,
        players: state.players.map(function(p) {
          return { name: p.name, scores: p.scores, total: calcTotal(p) };
        }),
        winner: isDraw ? null : topPlayers[0].name,
        draw: isDraw,
        drawNames: isDraw ? topPlayers.map(function(t) { return t.name; }) : [],
        maxTotal: maxTotal,
        minTotal: Math.min.apply(null, totals.map(function(t) { return t.total; }))
      };
      
      // Save to Supabase
      if (supabase) {
        supabase.from('yatzy_history').insert({
          played_at: historyEntry.playedAt,
          state: historyEntry,
          players: historyEntry.players,
          winner: historyEntry.winner,
          is_draw: historyEntry.draw,
          max_total: historyEntry.maxTotal,
          min_total: historyEntry.minTotal
        }).then(function(r) {
          if (r.error) alert('Could not save to cloud: ' + r.error.message);
        }).catch(function(){});
      }
      
      // Persist player names (but clear in-progress state)
      saveLastPlayerNames();
      clearGameState();
      
      // Show results modal
      showResultsModal(historyEntry);
    });
    
    document.getElementById('btn-cancel-game').addEventListener('click', function() {
      if (!confirm('Cancel game without saving?')) return;
      // Preserve player names but wipe game state
      saveLastPlayerNames();
      clearGameState();
      state.started = false;
      state.ended = false;
      state.players = [];
      // Re-seed setup names from what we just saved
      window._setupNames = loadLastPlayerNames() || ['Player 1', 'Player 2'];
      showScreen('screen-setup');
      renderPlayerInputs();
    });
    
    function showResultsModal(entry) {
      var modal = document.getElementById('score-modal');
      var h = '';
      if (entry.draw) {
        h += '<h3 style="text-align:center">🤝 Draw!</h3>';
        h += '<div class="cat-detail" style="text-align:center">' + entry.drawNames.join(' & ') + ' tied at ' + entry.maxTotal + ' points</div>';
      } else {
        h += '<h3 style="text-align:center">🏆 ' + escapeHtml(entry.winner) + ' wins!</h3>';
        h += '<div class="cat-detail" style="text-align:center">' + entry.maxTotal + ' points</div>';
      }
      h += '<div style="margin:14px 0;border-top:1px solid var(--border);padding-top:10px">';
      entry.players.slice().sort(function(a,b){return b.total-a.total;}).forEach(function(p, idx) {
        var trophy = '';
        if (!entry.draw && idx === 0) trophy = '🏆 ';
        else if (entry.draw && entry.drawNames.indexOf(p.name) >= 0) trophy = '🤝 ';
        h += '<div style="display:flex;justify-content:space-between;padding:6px 0"><span>' + trophy + escapeHtml(p.name) + '</span><span style="font-weight:600">' + p.total + '</span></div>';
      });
      h += '</div>';
      h += '<div class="modal-buttons">';
      h += '<button class="btn primary full" id="btn-results-done">Done</button>';
      h += '</div>';
      modal.innerHTML = h;
      document.getElementById('score-modal-overlay').classList.add('open');
      document.getElementById('btn-results-done').addEventListener('click', function() {
        closeScoreModal();
        clearGameState();
        state.started = false;
        state.ended = false;
        state.players = [];
        window._setupNames = loadLastPlayerNames() || ['Player 1', 'Player 2'];
        showScreen('screen-setup');
        renderPlayerInputs();
      });
    }
    
    // =============================================================================
    // STATS SCREEN
    // =============================================================================
    document.getElementById('btn-stats-back').addEventListener('click', function() {
      showScreen('screen-setup');
    });
    
    function renderStats() {
      var panel = document.getElementById('stats-panel');
      panel.innerHTML = '<div class="dim center" style="padding:20px">Loading…</div>';
      if (!supabase) {
        panel.innerHTML = '<div class="dim center" style="padding:20px">Supabase not configured.</div>';
        return;
      }
      supabase.from('yatzy_history').select('*').order('played_at', { ascending: false }).limit(500).then(function(r) {
        if (r.error) {
          panel.innerHTML = '<div class="dim center" style="padding:20px">Error: ' + escapeHtml(r.error.message) + '</div>';
          return;
        }
        var games = r.data || [];
        if (!games.length) {
          panel.innerHTML = '<div class="dim center" style="padding:20px">No games yet — finish a game to see stats.</div>';
          return;
        }
        // Build player rollups
        var byPlayer = {};
        function row(name) {
          if (!byPlayer[name]) byPlayer[name] = { name: name, wins: 0, losses: 0, draws: 0, highest: 0, lowest: Infinity, games: 0, scoredGames: 0, totalSum: 0 };
          return byPlayer[name];
        }
        games.forEach(function(g) {
          var players = g.players || (g.state && g.state.players) || [];
          var isDraw = g.is_draw;
          var winner = g.winner;
          players.forEach(function(p) {
            var pr = row(p.name);
            pr.games++;
            // Only count totals when they're real numbers (skip null/undefined for legacy imports)
            if (typeof p.total === 'number') {
              pr.totalSum += p.total;
              pr.scoredGames++;
              if (p.total > pr.highest) pr.highest = p.total;
              if (p.total < pr.lowest) pr.lowest = p.total;
            }
            if (isDraw) {
              // If their name is in the draw set, count as draw; otherwise loss
              var ds = g.state && g.state.drawNames;
              if (ds && ds.indexOf(p.name) >= 0) pr.draws++;
              else pr.losses++;
            } else {
              if (p.name === winner) pr.wins++;
              else pr.losses++;
            }
          });
        });
        
        var rows = Object.keys(byPlayer).map(function(k) { return byPlayer[k]; });
        rows.sort(function(a, b) { return b.wins - a.wins || b.highest - a.highest; });
        
        var h = '';
        h += '<div class="stats-row header"><div>Player</div><div>W</div><div>L</div><div>D</div><div>High / Low</div></div>';
        rows.forEach(function(p) {
          var avg = p.scoredGames ? Math.round(p.totalSum / p.scoredGames) : 0;
          var hi = p.scoredGames ? p.highest : null;
          var lo = (p.scoredGames && p.lowest !== Infinity) ? p.lowest : null;
          h += '<div class="stats-row">';
          h += '<div class="name">' + escapeHtml(p.name) + ' <span class="dim small">(' + p.games + 'g' + (p.scoredGames ? ' · avg ' + avg : '') + ')</span></div>';
          h += '<div>' + p.wins + '</div>';
          h += '<div>' + p.losses + '</div>';
          h += '<div>' + p.draws + '</div>';
          h += '<div class="dim small">' + (hi != null ? hi : '–') + ' / ' + (lo != null ? lo : '–') + '</div>';
          h += '</div>';
        });
        h += '<div class="dim small" style="text-align:center;padding:12px 0;border-top:1px solid var(--border);margin-top:8px">' + games.length + ' game' + (games.length === 1 ? '' : 's') + ' recorded</div>';
        panel.innerHTML = h;
      });
    }
    
    // =============================================================================
    // UTILITIES
    // =============================================================================
    function escapeHtml(s) {
      return (s == null ? '' : String(s))
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    // =============================================================================
    // RESUME (load in-progress game from localStorage)
    // =============================================================================
    function checkForResume() {
      var saved = loadSavedGameState();
      var banner = document.getElementById('resume-banner');
      if (!saved) {
        banner.style.display = 'none';
        return;
      }
      banner.style.display = '';
      // Detail line: how many cells filled, when started
      var filled = 0;
      var total = saved.players.length * CATEGORIES.length;
      saved.players.forEach(function(p) {
        CATEGORIES.forEach(function(c) {
          if (p.scores[c.key] !== null && p.scores[c.key] !== undefined) filled++;
        });
      });
      var when = '';
      try {
        var t = new Date(saved.startTime);
        when = ' · started ' + t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      } catch (e) {}
      document.getElementById('resume-detail').textContent =
        saved.players.length + ' players · ' + filled + '/' + total + ' cells filled' + when;
    }
    
    document.getElementById('btn-resume').addEventListener('click', function() {
      var saved = loadSavedGameState();
      if (!saved) return;
      // Restore state
      state = saved;
      showScreen('screen-game');
      renderScorecard();
    });
    
    document.getElementById('btn-discard-resume').addEventListener('click', function() {
      if (!confirm('Discard the in-progress game? This cannot be undone.')) return;
      clearGameState();
      checkForResume();
    });
    
    // =============================================================================
    // INIT
    // =============================================================================
    renderPlayerInputs();
    checkForResume();
    initSupabase();
    
    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
  </script>
</body>
